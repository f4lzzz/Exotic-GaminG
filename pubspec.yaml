name: exotic_gaming_and_cafe
description: "Aplikasi Internal Exotic Gaming and Cafe untuk manajemen karyawan, absensi, dan laporan keuangan."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.19.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  image_picker: ^1.1.2
  firebase_storage: ^12.0.0
  camera: ^0.10.5+9
  geolocator: ^11.0.0
  permission_handler: ^11.3.0
  google_maps_flutter: ^2.6.1
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - images/